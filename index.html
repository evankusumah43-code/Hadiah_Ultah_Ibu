<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barakallah Fii 'Umrik Ibu Tercinta ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animasi bintang */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .cake {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3.5em;
            color: #d63384;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 3px 3px 6px rgba(0,0,0,0.3), 0 0 10px #ff69b4; }
            to { text-shadow: 3px 3px 6px rgba(0,0,0,0.3), 0 0 20px #ff1493; }
        }

        .message {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            text-align: center;
            margin: 30px 0;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5);
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message h2 {
            color: #d63384;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .message p {
            font-size: 1.3em;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .heart {
            font-size: 3em;
            color: #ff1493;
            animation: heartbeat 1.5s infinite;
            margin: 20px 0;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .btn {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255,107,157,0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255,107,157,0.6);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
        }

        .countdown {
            font-size: 1.5em;
            color: #d63384;
            margin: 20px 0;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .cake { font-size: 60px; }
            .message { padding: 30px 20px; }
            .message h2 { font-size: 1.5em; }
            .message p { font-size: 1.1em; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="fireworks" id="fireworks"></div>

    <div class="container">
        <div class="cake">🎂✨🎂</div>
        <h1>Barakallah Fii 'Umrik, Ibuu 🎉</h1>
        
        <div class="message">
            <h2>Ibu Tercinta ❤️</h2>
            <p>Semoga Ibu selalu sehat, bahagia, dilimpahkan rezeji dan penuh berkah yaa. Terima kasih atas semua kasih sayang dan pengorbanan Ibu. Ibu adalah malaikat terbaik dalam hidup kami!</p>
            <div class="heart">💖</div>
            <p>Kami sayang Ibu selamanya! 🥰</p>
        </div>

        <div class="countdown" id="countdown"></div>
        
        <button class="btn" onclick="showFireworks()">💥 Rayakan Ultah</button>
        <button class="btn" onclick="sendLove()">💝 Badai Cinta</button>
        <button id="toggleMusic" class="btn" style="background: linear-gradient(45deg, #6c757d, #adb5bd); margin-top: 20px;">
    🔇 Matikan Musik
</button>
    </div>

<audio id="bgMusic" loop>
    <source src="my_love (mp3cut.net).mp3" type="audio/mpeg">
</audio>
    <script>
        // Buat bintang berkedip
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Keren kembang api
        function showFireworks() {
            const fireworksContainer = document.getElementById('fireworks');
            fireworksContainer.innerHTML = '';

            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    createFirework(fireworksContainer);
                }, i * 100);
            }
        }

        function createFirework(container) {
            const firework = document.createElement('div');
            firework.className = 'firework';
            
            const colors = ['#ff6b9d', '#ff8fab', '#d63384', '#ff1493', '#c44569'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            firework.style.left = Math.random() * 100 + '%';
            firework.style.top = Math.random() * 100 + '%';
            firework.style.background = color;
            
            // Animasi meledak
            firework.animate([
                { transform: 'scale(0)', opacity: 1 },
                { transform: 'scale(8)', opacity: 0 }
            ], {
                duration: 800,
                easing: 'ease-out'
            });
            
            container.appendChild(firework);
            
            setTimeout(() => firework.remove(), 800);
        }

        // Kirim cinta (animasi hati)
        function sendLove() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    createFloatingHeart();
                }, i * 200);
            }
        }

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💖';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '30px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '100';
            heart.style.animation = 'floatUp 3s ease-out forwards';
            
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 3000);
        }

        // Tambah CSS untuk floating heart
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                to {
                    transform: translateY(-100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Inisialisasi
        window.onload = function() {
            createStars();
            startCountdown();
            setInterval(startCountdown, 60000); // Update setiap menit
            
            // Auto fireworks setelah 3 detik
            setTimeout(() => {
                showFireworks();
            }, 3000);
        };

        const bgMusic = document.getElementById('bgMusic');

        // Fungsi untuk memulai musik
        function startMusic() {
            if (bgMusic.paused) {
            bgMusic.volume = 0.5; // Volume 50% agar tidak terlalu keras
           bgMusic.play();
        }
}

    // Menghubungkan ke tombol yang sudah ada
    const btnRayakan = document.querySelector('.btn[onclick="showFireworks()"]');
    const btnCinta = document.querySelector('.btn[onclick="sendLove()"]');

    btnRayakan.addEventListener('click', startMusic);
    btnCinta.addEventListener('click', startMusic);

    const musicBtn = document.getElementById('toggleMusic');

musicBtn.addEventListener('click', function() {
    if (bgMusic.paused) {
        bgMusic.play();
        this.innerHTML = "🔇 Matikan Musik";
        this.style.background = "linear-gradient(45deg, #6c757d, #adb5bd)";
    } else {
        bgMusic.pause();
        this.innerHTML = "🔊 Putar Musik";
        this.style.background = "linear-gradient(45deg, #28a745, #2ecc71)"; // Warna hijau saat berhenti
    }
});
    </script>
</body>
</html>
